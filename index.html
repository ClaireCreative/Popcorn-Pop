<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Popcorn Pop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#fff9e0;overflow:hidden}
#game{position:relative;height:100vh;overflow:hidden}

#topbar{display:none;justify-content:space-between;align-items:center;padding:12px 20px;font-weight:bold;font-size:18px;background:rgba(255,249,224,0.9);z-index:10;position:relative}
#prompt{display:none;text-align:center;font-size:72px;font-weight:900;padding:10px 0 0;line-height:1}
#timer{display:none;text-align:center;font-size:20px;color:#666;padding:4px 0}
#feedback{text-align:center;font-size:22px;font-weight:bold;min-height:32px;padding:2px 0}
#arena{display:none;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.kernel{
  position:absolute;
  font-size:52px;
  cursor:pointer;
  pointer-events:all;
  transition:transform .1s;
  user-select:none;
  line-height:1;
}
.kernel:hover{transform:scale(1.25)!important}

.btn{
  padding:14px 28px;
  font-size:22px;
  cursor:pointer;
  border:none;
  border-radius:14px;
  background:#f5a623;
  font-weight:bold;
  box-shadow:0 4px 0 #c47b00;
  transition:transform .1s,box-shadow .1s;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #c47b00}

#levelSelect{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:20px;
  background:#fff9e0;
  z-index:100;
}
#levelSelect h1{font-size:56px;font-weight:900}

/* CHEER CARD */
#cheerCard{
  position:absolute;inset:0;
  display:none;
  justify-content:center;align-items:center;
  z-index:200;
  background:rgba(0,0,0,0.45);
}
#cheerInner{
  background:#fff;
  border-radius:28px;
  padding:40px 52px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:bounceIn .45s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0}
  60%{transform:scale(1.1)}
  80%{transform:scale(0.95)}
  100%{transform:scale(1);opacity:1}
}
#cheerEmoji{
  font-size:110px;
  animation:wiggle .6s ease-in-out infinite alternate;
}
@keyframes wiggle{
  0%{transform:rotate(-12deg) scale(1)}
  100%{transform:rotate(12deg) scale(1.08)}
}
#cheerWord{
  font-size:35px;
  font-weight:bold;
}

/* TROPHY */
#trophyScreen{
  position:absolute;inset:0;
  display:none;
  justify-content:center;align-items:center;
  flex-direction:column;gap:20px;
  background:rgba(0,0,0,0.65);
  z-index:300;
}
#trophyInner{
  background:#fff;
  border-radius:28px;
  padding:40px 52px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:bounceIn .5s cubic-bezier(.36,.07,.19,.97) both;
}
#trophyEmoji{font-size:100px;animation:wiggle .7s ease-in-out infinite alternate}
#trophyText{font-size:32px;font-weight:900;color:#f5a623}
#trophySub{font-size:20px;color:#555}
#trophyBtn{margin-top:8px}

/* CONFETTI CANVAS */
#confettiCanvas{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:199;
}
#trophyConfetti{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:299;
}

@keyframes fadeInUp{
  0%{opacity:0;transform:translateY(30px)}
  100%{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div id="game">

  <canvas id="confettiCanvas"></canvas>
  <canvas id="trophyConfetti"></canvas>

  <div id="levelSelect">
    <h1>🍿 Popcorn Pop</h1>
    <button class="btn" onclick="handleStart()">🍿 Start Popping!</button>
  </div>

  <div id="topbar">
    <div id="levelLabel">Level 1</div>
    <div id="score">⭐ 0</div>
  </div>
  <div id="prompt"></div>
  <div id="timer"></div>
  <div id="feedback"></div>
  <div id="arena"></div>

  <div id="cheerCard">
    <div id="cheerInner">
      <div id="cheerEmoji">🎉</div>
      <div id="cheerWord" style="color:#f5a623">Amazing!</div>
      <button class="btn" onclick="dismissCheer()">Keep Going! 🍿</button>
    </div>
  </div>

  <div id="trophyScreen">
    <div id="trophyInner">
      <div id="trophyEmoji">🏆</div>
      <div id="trophyText">YOU DID IT!</div>
      <div id="trophySub">All levels complete!</div>
      <button class="btn trophyBtn" onclick="location.reload()">Play Again! 🍿</button>
    </div>
  </div>

</div>

<script>
const TEEN=[11,12,13,14,15,16,17,18,19];
const CHEERS=[
  {word:"Amazing!",color:"#f5a623",emoji:"🎉"},
  {word:"HOORAY!",color:"#e74c9f",emoji:"🌟"},
  {word:"Brilliant!",color:"#27ae60",emoji:"🦄"},
  {word:"Fantastic!",color:"#8e44ad",emoji:"🚀"},
  {word:"SUPERSTAR!",color:"#e74c3c",emoji:"⭐"},
  {word:"WOW WOW!",color:"#2980b9",emoji:"🎊"},
  {word:"Incredible!",color:"#16a085",emoji:"🔥"},
  {word:"AWESOME!",color:"#d35400",emoji:"💥"}
];

const MAX_LEVELS = 4;

let level=1,score=0,combo=0,answer=0;
let timeLeft=10,timerInterval=null;
let questionCount=0;
const TOTAL_Q=6;

// Speed per level: [minSpeed, maxSpeed] multiplier (levels 1–4)
const SPEED=[null,[0.5,0.9],[0.9,1.4],[1.4,2.0],[2.8,3.8]];

// Track numbers used per level to avoid repeats
let usedAnswers=[];

let kernelAnimFrames=[];
let confettiParticles=[];
let trophyParticles=[];

/* AUDIO */
function playSound(freq,dur=.25,type='sine'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.type=type;o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;
    g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playClick(){playSound(500,.15)}
function playCorrect(){playSound(700,.3);setTimeout(()=>playSound(900,.2),150)}
function playWrong(){playSound(180,.35,'sawtooth')}
function playCheer(){
  [500,650,800,1000,1200,1400].forEach((f,i)=>setTimeout(()=>playSound(f,.35),i*100));
}
function playTrophyFanfare(){
  const notes=[523,659,784,1047];
  notes.forEach((f,i)=>setTimeout(()=>playSound(f,.4),i*160));
  setTimeout(()=>playCheer(),800);
}

/* CONFETTI ENGINE */
function spawnConfetti(canvasId,count=80){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const colors=['#f5a623','#e74c9f','#27ae60','#8e44ad','#2980b9','#e74c3c','#f1c40f','#16a085'];
  const particles=[];
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*100,
      r:6+Math.random()*7,
      color:colors[Math.floor(Math.random()*colors.length)],
      dx:(Math.random()-.5)*3,
      dy:3+Math.random()*4,
      rot:Math.random()*360,
      drot:(Math.random()-.5)*8,
      shape:Math.random()<.5?'rect':'circle'
    });
  }
  return {canvas,ctx,particles};
}

function runConfetti(state,stopAfter=2500){
  let running=true;
  const stop=setTimeout(()=>{running=false;state.ctx.clearRect(0,0,state.canvas.width,state.canvas.height)},stopAfter);
  function frame(){
    if(!running)return;
    state.ctx.clearRect(0,0,state.canvas.width,state.canvas.height);
    state.particles.forEach(p=>{
      p.x+=p.dx;p.y+=p.dy;p.rot+=p.drot;
      if(p.y>state.canvas.height+20){p.y=-20;p.x=Math.random()*state.canvas.width}
      state.ctx.save();
      state.ctx.translate(p.x,p.y);
      state.ctx.rotate(p.rot*Math.PI/180);
      state.ctx.fillStyle=p.color;
      if(p.shape==='circle'){
        state.ctx.beginPath();state.ctx.arc(0,0,p.r,0,Math.PI*2);state.ctx.fill();
      }else{
        state.ctx.fillRect(-p.r,-p.r*.5,p.r*2,p.r);
      }
      state.ctx.restore();
    });
    requestAnimationFrame(frame);
  }
  frame();
  return stop;
}

/* GAME FLOW */
function handleStart(){playClick();startGame()}

function startGame(){
  document.getElementById('levelSelect').style.display='none';
  ['topbar','prompt','timer','arena'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display=(id==='topbar')?'flex':'block';
  });
  startLevel(1);
}

function startLevel(l){
  level=l;questionCount=0;combo=0;
  usedAnswers=[];
  document.getElementById('feedback').textContent='';
  newQuestion();
}

function pickUnusedTeen(){
  // Pick a teen number not yet used this level; reset if exhausted
  const available=TEEN.filter(n=>!usedAnswers.includes(n));
  if(available.length===0){
    usedAnswers=[];
    return TEEN[Math.floor(Math.random()*TEEN.length)];
  }
  return available[Math.floor(Math.random()*available.length)];
}

function newQuestion(){
  clearInterval(timerInterval);
  kernelAnimFrames.forEach(cancelAnimationFrame);
  kernelAnimFrames=[];

  if(questionCount>=TOTAL_Q){
    showLevelCheer();
    return;
  }

  timeLeft=10;
  const n=pickUnusedTeen();
  usedAnswers.push(n);

  // Level 1: Find n
  // Level 2: 1 more than n  → answer = n+1
  // Level 3: 1 less than n  → answer = n-1, base shown = n
  // Level 4 (old 5): 10 + (n-10)
  if(level===1){
    answer=n;setPrompt(`Find ${n}`);
  }else if(level===2){
    answer=n+1;setPrompt(`1 more than ${n}`);
  }else if(level===3){
    // ensure answer stays in teen range (≥11): pick n from 12–19
    const base=(n<12)?12:n;
    answer=base-1;setPrompt(`1 less than ${base}`);
  }else{
    // Level 4: 10 + something
    answer=n;setPrompt(`10 + ${n-10}`);
  }

  renderKernels();
  startTimer();
}

function setPrompt(text){
  document.getElementById('prompt').textContent=text;
  document.getElementById('timer').textContent='⏱️ '+timeLeft;
  document.getElementById('levelLabel').textContent='Level '+level+' of '+MAX_LEVELS;
  document.getElementById('score').textContent='⭐ '+score;
}

function startTimer(){
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent='⏱️ '+timeLeft;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      combo=0;
      playWrong();
      document.getElementById('feedback').textContent='⏰ Too slow! Try the next one.';
      setTimeout(()=>{document.getElementById('feedback').textContent='';newQuestion();},900);
    }
  },1000);
}

/* NON-OVERLAPPING PLACEMENT */
function generatePositions(count, margin, topOffset, bottomPad, minDist) {
  const W = window.innerWidth - margin * 2;
  const H = window.innerHeight - topOffset - bottomPad;
  const placed = [];
  const maxAttempts = 500;

  for (let i = 0; i < count; i++) {
    let x, y, attempts = 0, ok = false;
    while (attempts < maxAttempts) {
      x = margin + Math.random() * W;
      y = topOffset + Math.random() * H;
      ok = placed.every(p => Math.hypot(p.x - x, p.y - y) >= minDist);
      if (ok) break;
      attempts++;
    }
    placed.push({ x, y });
  }
  return placed;
}

function renderKernels(){
  const arena=document.getElementById('arena');
  arena.innerHTML='';

  // Build distractor pool — all unique, answer included, no repeats
  const pool = [answer];
  const distractors = TEEN.filter(n => n !== answer);
  // Shuffle distractors
  for (let i = distractors.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [distractors[i], distractors[j]] = [distractors[j], distractors[i]];
  }
  while (pool.length < 5 && distractors.length > 0) {
    pool.push(distractors.shift());
  }
  // Shuffle pool
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  const margin = 80;
  const topOffset = 200;   // below prompt/timer area
  const bottomPad = 100;
  const minDist = 130;     // minimum px between kernel centres — prevents overlap

  const positions = generatePositions(pool.length, margin, topOffset, bottomPad, minDist);
  const [sMin, sMax] = SPEED[level];

  pool.forEach((n, idx) => {
    const d = document.createElement('div');
    d.className = 'kernel';
    d.textContent = '🍿' + n;

    let px = positions[idx].x;
    let py = positions[idx].y;
    d.style.left = px + 'px';
    d.style.top  = py + 'px';
    d.onclick = () => clickKernel(n, d);
    arena.appendChild(d);

    const speed = sMin + Math.random() * (sMax - sMin);
    let dx = (Math.random() - .5) * 2 * speed;
    let dy = (Math.random() - .5) * 2 * speed;
    if (Math.abs(dx) < 0.2) dx = 0.2 * (Math.sign(dx) || 1);
    if (Math.abs(dy) < 0.2) dy = 0.2 * (Math.sign(dy) || 1);

    // Keep bouncing within safe area so kernels don't drift onto each other's start zone
    const bounce = () => {
      px += dx; py += dy;
      if (px < margin || px > window.innerWidth - margin) dx *= -1;
      if (py < topOffset - 40 || py > window.innerHeight - bottomPad) dy *= -1;
      d.style.left = px + 'px';
      d.style.top  = py + 'px';
      kernelAnimFrames.push(requestAnimationFrame(bounce));
    };
    kernelAnimFrames.push(requestAnimationFrame(bounce));
  });
}

function clickKernel(n,el){
  if(n===answer){
    clearInterval(timerInterval);
    kernelAnimFrames.forEach(cancelAnimationFrame);
    kernelAnimFrames=[];
    playCorrect();
    combo++;
    score+=1+combo;
    document.getElementById('score').textContent='⭐ '+score;
    document.getElementById('feedback').textContent='✅ Correct! +' +(1+combo);
    el.style.fontSize='80px';
    el.style.transition='all .25s';
    setTimeout(()=>{
      el.remove();
      questionCount++;
      document.getElementById('feedback').textContent='';
      newQuestion();
    },350);
  }else{
    combo=0;
    playWrong();
    el.style.opacity='.4';
    setTimeout(()=>el.style.opacity='1',350);
    document.getElementById('feedback').textContent='❌ Not quite — keep looking!';
    setTimeout(()=>document.getElementById('feedback').textContent='',900);
  }
}

/* LEVEL CHEER */
function showLevelCheer(){
  clearInterval(timerInterval);
  kernelAnimFrames.forEach(cancelAnimationFrame);kernelAnimFrames=[];

  const pick=CHEERS[Math.floor(Math.random()*CHEERS.length)];
  document.getElementById('cheerEmoji').textContent=pick.emoji;
  document.getElementById('cheerWord').textContent=pick.word;
  document.getElementById('cheerWord').style.color=pick.color;
  document.getElementById('cheerCard').style.display='flex';

  playCheer();
  const state=spawnConfetti('confettiCanvas',100);
  runConfetti(state,3200);
}

function dismissCheer(){
  document.getElementById('cheerCard').style.display='none';
  document.getElementById('confettiCanvas').getContext('2d').clearRect(0,0,window.innerWidth,window.innerHeight);
  if(level < MAX_LEVELS){
    startLevel(level+1);
  }else{
    showTrophy();
  }
}

/* TROPHY */
function showTrophy(){
  document.getElementById('trophyScreen').style.display='flex';
  playTrophyFanfare();
  const state=spawnConfetti('trophyConfetti',150);
  runConfetti(state,6000);
}
</script>
</body>
</html>
